name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.2.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            make
            mingw-w64-x86_64-toolchain
            mingw-w64-i686-toolchain

      - name: Create cross-compiler symlinks
        run: |
          # MINGW64 tools → x86_64-w64-mingw32-* names
          ln -sf /mingw64/bin/gcc.exe /usr/local/bin/x86_64-w64-mingw32-gcc
          ln -sf /mingw64/bin/g++.exe /usr/local/bin/x86_64-w64-mingw32-g++
          ln -sf /mingw64/bin/strip.exe /usr/local/bin/x86_64-w64-mingw32-strip
          ln -sf /mingw64/bin/ld.exe /usr/local/bin/x86_64-w64-mingw32-ld
          ln -sf /mingw64/bin/ar.exe /usr/local/bin/x86_64-w64-mingw32-ar

          # MINGW32 tools → i686-w64-mingw32-* names
          ln -sf /mingw32/bin/gcc.exe /usr/local/bin/i686-w64-mingw32-gcc
          ln -sf /mingw32/bin/g++.exe /usr/local/bin/i686-w64-mingw32-g++
          ln -sf /mingw32/bin/strip.exe /usr/local/bin/i686-w64-mingw32-strip
          ln -sf /mingw32/bin/ld.exe /usr/local/bin/i686-w64-mingw32-ld
          ln -sf /mingw32/bin/ar.exe /usr/local/bin/i686-w64-mingw32-ar

          # Verify
          x86_64-w64-mingw32-gcc --version
          i686-w64-mingw32-gcc --version

      - name: Build all BOFs
        run: make all

      - name: Package Extension-Kit
        run: |
          mkdir -p release/extension-kit
          cp extension-kit.axs release/extension-kit/

          for dir in AD-BOF Creds-BOF Elevation-BOF Execution-BOF Injection-BOF LateralMovement-BOF Postex-BOF Process-BOF SAL-BOF SAR-BOF; do
            if [ -d "$dir" ]; then
              mkdir -p "release/extension-kit/${dir}"
              # Copy compiled BOF objects
              if [ -d "${dir}/_bin" ]; then
                cp -r "${dir}/_bin" "release/extension-kit/${dir}/"
              fi
              # Copy AxScript files
              find "$dir" -name "*.axs" | while read f; do
                cp --parents "$f" release/extension-kit/
              done
            fi
          done

          cd release
          tar -czf extension-kit.tar.gz extension-kit/

      - uses: actions/upload-artifact@v4
        with:
          name: extension-kit
          path: release/extension-kit.tar.gz

  release:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: Extension-Kit ${{ inputs.version }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: |
            artifacts/extension-kit/extension-kit.tar.gz
